<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reglamento - Torneo Mecenas</title>
  <style>
    :root {
      --azul:  #083f89;
      --ocre:  #bc883d;
      --blanco: #ffffff;
      --gris-claro: #f5f5f5;
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0; padding: 0;
      background-color: var(--gris-claro);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    header {
      background: var(--ocre);
      color: var(--blanco);
      width: 100%;
      padding: 1.5rem;
      text-align: center;
      box-sizing: border-box;
    }
    header h1 {
      margin: 0;
      font-size: 1.6rem;
    }
    header span {
      color: var(--azul);
    }
    .franja {
      width: 100%;
      height: 6px;
      background: linear-gradient(90deg, var(--ocre) 0%, var(--azul) 100%);
    }
    .message-card {
      background: var(--blanco);
      margin-top: 4rem;
      padding: 3rem;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
      border-top: 4px solid var(--azul);
      max-width: 600px;
      width: 90%;
      text-align: center;
      box-sizing: border-box;
    }
    .message-card h2 {
      color: var(--azul);
      margin-top: 0;
      margin-bottom: 1.5rem;
    }
    .message-card p {
      color: #333;
      font-size: 1.15rem;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <header>
    <h1>Torneo <span>Mecenas</span> · Fundación Real Madrid</h1>
  </header>
  <div class="franja"></div>

  <div class="message-card">
    <h2>📜 Reglamento del Torneo</h2>
    <p>Estamos en proceso de cerrar el reglamento. En las próximas semanas lo publicaremos en este mismo canal.</p>
  </div>
</body>
</html>
